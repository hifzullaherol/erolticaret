<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOBALTECH MAKİNA — Kompresör Yedek Parça</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #f97316;
    --accent2: #fbbf24;
    --text: #e8e8e8;
    --muted: #666;
    --card-hover: #1e1e1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 64px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--accent);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo span { color: var(--text); }

  .search-bar {
    flex: 1;
    max-width: 520px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px 9px 42px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 4px;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .cart-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 9px 18px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 4px;
    transition: background 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .cart-btn:hover { background: var(--accent2); }

  .cart-count {
    background: #000;
    color: var(--accent);
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0f06 50%, #0a0a0a 100%);
    border-bottom: 1px solid var(--border);
    padding: 56px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(249,115,22,0.12) 0%, transparent 70%);
  }

  .hero-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 80px);
    letter-spacing: 6px;
    line-height: 1;
    margin-bottom: 12px;
    position: relative;
  }

  .hero h1 span { color: var(--accent); }

  .hero p {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
    position: relative;
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 48px;
    margin-top: 32px;
    position: relative;
  }

  .stat { text-align: center; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    letter-spacing: 2px;
    display: block;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* MAIN LAYOUT */
  .main-layout {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    gap: 28px;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .cat-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--muted);
    padding: 9px 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    line-height: 1.4;
  }

  .cat-btn:hover { color: var(--text); background: var(--surface); }
  .cat-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(249,115,22,0.08); }

  .cat-count {
    float: right;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1px 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: 8px;
  }

  .price-filter {
    margin-top: 24px;
  }

  .price-filter-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .price-inputs {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .price-inputs input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    border-radius: 3px;
    width: 80px;
  }

  .price-inputs input:focus { border-color: var(--accent); }
  .price-inputs span { color: var(--muted); font-size: 12px; }

  /* CONTENT */
  .content { flex: 1; min-width: 0; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 16px;
  }

  .result-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .result-info span { color: var(--accent); }

  .sort-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    border-radius: 3px;
  }

  /* PRODUCT GRID */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }

  .product-card:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(249,115,22,0.12);
  }

  .product-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .product-img-placeholder {
    width: 100%;
    height: 160px;
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .product-img-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.015) 10px,
        rgba(255,255,255,0.015) 20px
      );
  }

  .part-icon {
    font-size: 32px;
    filter: grayscale(1) opacity(0.5);
  }

  .part-code-bg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: rgba(249,115,22,0.4);
    letter-spacing: 2px;
  }

  .product-body { padding: 14px; }

  .product-category {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .product-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .product-en {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .product-partno {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 6px;
    border-radius: 2px;
  }

  .product-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--accent2);
  }

  .add-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px;
    margin-top: 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .add-btn:hover { background: var(--accent); color: #000; }
  .add-btn.added { background: var(--accent); color: #000; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 24px; }

  .modal-img-placeholder {
    width: 100%;
    height: 200px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .modal-img-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 15px,
      rgba(255,255,255,0.015) 15px, rgba(255,255,255,0.015) 30px
    );
  }

  .modal-part-icon { font-size: 48px; filter: grayscale(1) opacity(0.4); }

  .modal-part-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(249,115,22,0.5);
    letter-spacing: 3px;
  }

  .detail-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 13px;
  }

  .detail-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    min-width: 80px;
    padding-top: 2px;
  }

  .detail-val { color: var(--text); line-height: 1.5; }

  .modal-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--accent2);
    letter-spacing: 2px;
    margin: 16px 0;
  }

  .modal-price small {
    font-size: 16px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
  }

  .modal-add-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #000;
    padding: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .modal-add-btn:hover { background: var(--accent2); }

  /* CART PANEL */
  .cart-panel {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 380px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 300;
    flex-direction: column;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  .cart-panel.open { display: flex; }

  .cart-panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cart-panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .cart-items { flex: 1; overflow-y: auto; padding: 16px; }

  .cart-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .cart-item-info { flex: 1; min-width: 0; }

  .cart-item-name {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .cart-item-no {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .cart-item-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent2);
    white-space: nowrap;
  }

  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .qty-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 24px;
    height: 24px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    transition: all 0.1s;
  }

  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-num { font-family: 'IBM Plex Mono', monospace; font-size: 13px; min-width: 20px; text-align: center; }

  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px;
    transition: color 0.15s;
    font-size: 16px;
  }

  .remove-btn:hover { color: #ef4444; }

  .cart-footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
  }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }

  .cart-total-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .cart-total-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent2);
    letter-spacing: 2px;
  }

  .checkout-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #000;
    padding: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    transition: background 0.15s;
  }

  .checkout-btn:hover { background: var(--accent2); }

  .empty-cart {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .empty-cart-icon { font-size: 40px; opacity: 0.3; }
  .empty-cart-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* PAGINATION */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .page-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    transition: all 0.15s;
  }

  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .no-results {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .no-results-icon { font-size: 48px; margin-bottom: 16px; }
  .no-results h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .no-results p { font-size: 13px; }

  /* OVERLAY BACKDROP */
  .cart-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 290;
  }
  .cart-backdrop.open { display: block; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    padding: 10px 20px;
    border-radius: 4px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 400;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .hero-stats { gap: 24px; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .cart-panel { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#"><span>GLOBAL</span>TECH</a>
    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Parça no veya açıklama ara..." autocomplete="off">
    </div>
    <button class="cart-btn" onclick="toggleCart()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Sepet
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>

:"DIZEL DEPOSU G220 HAZIR","english_name":"G220 DIESEL TANK","price_usd":113.8,"category":"DİZEL AKSAMLARI YEDEK PARÇALARI"},{"part_no":"G101060003","turkish_name":"DIZEL DEPOSU G160 HAZIR","english_name":"G160 DIESEL TANK","price_usd":113.8,"category":"DİZEL AKSAMLARI YEDEK PARÇALARI"}];

// Icon mapping
function getIcon(p) {
  const n = (p.turkish_name + ' ' + p.english_name).toLowerCase();
  if (n.includes('piston')) return '🔩';
  if (n.includes('rulman') || n.includes('bearing')) return '⚙️';
  if (n.includes('karter') || n.includes('housing')) return '🏭';
  if (n.includes('krank') || n.includes('crank')) return '🔧';
  if (n.includes('fan')) return '💨';
  if (n.includes('filtre') || n.includes('filter')) return '🌀';
  if (n.includes('conta') || n.includes('gasket') || n.includes('seal') || n.includes('kece')) return '🔴';
  if (n.includes('oring')) return '⭕';
  if (n.includes('motor')) return '⚡';
  if (n.includes('klepe') || n.includes('valve')) return '🔒';
  if (n.includes('radyator') || n.includes('radiator')) return '🌡️';
  if (n.includes('sase') || n.includes('chassis')) return '🏗️';
  if (n.includes('segman') || n.includes('ring')) return '💍';
  if (n.includes('depo') || n.includes('tank')) return '🛢️';
  if (n.includes('kablo') || n.includes('cable') || n.includes('elektrik')) return '🔌';
  if (n.includes('pano') || n.includes('panel')) return '🖥️';
  if (n.includes('dizel') || n.includes('diesel')) return '⛽';
  if (n.includes('kompresor') || n.includes('compressor')) return '🏭';
  return '🔩';
}

const ITEMS_PER_PAGE = 24;
let currentPage = 1;
let filteredProducts = [...PRODUCTS];
let currentCat = 'all';
let cart = {};

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const minP = parseFloat(document.getElementById('priceMin').value) || 0;
  const maxP = parseFloat(document.getElementById('priceMax').value) || Infinity;

  filteredProducts = PRODUCTS.filter(p => {
    const matchCat = currentCat === 'all' || p.category === currentCat;
    const matchQ = !q || p.turkish_name.toLowerCase().includes(q) || 
                   p.english_name.toLowerCase().includes(q) || 
                   p.part_no.toLowerCase().includes(q);
    const matchP = p.price_usd >= minP && p.price_usd <= maxP;
    return matchCat && matchQ && matchP;
  });

  if (sort === 'price-asc') filteredProducts.sort((a,b) => a.price_usd - b.price_usd);
  else if (sort === 'price-desc') filteredProducts.sort((a,b) => b.price_usd - a.price_usd);
  else if (sort === 'name-asc') filteredProducts.sort((a,b) => a.turkish_name.localeCompare(b.turkish_name));

  currentPage = 1;
  renderProducts();
}

function filterCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  applyFilters();
}

function renderProducts() {
  const grid = document.getElementById('productGrid');
  const total = filteredProducts.length;
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const page = filteredProducts.slice(start, start + ITEMS_PER_PAGE);

  document.getElementById('resultCount').textContent = total;

  if (total === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
      <div class="no-results-icon">🔍</div>
      <h3>Ürün Bulunamadı</h3>
      <p>Arama kriterlerinizi değiştirmeyi deneyin.</p>
    </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = page.map((p, i) => {
    const icon = getIcon(p);
    const shortCat = p.category.replace('& YEDEK PARÇA LİSTESİ', '').replace('YEDEK PARÇA LİSTESİ', '').replace('YEDEK PARÇALARI', '').trim();
    const inCart = cart[p.part_no];
    return `<div class="product-card" onclick="openModal('${p.part_no}')" style="animation-delay:${i*0.03}s">
      <div class="product-img-placeholder">
        <div class="part-icon">${icon}</div>
        <div class="part-code-bg">${p.part_no}</div>
      </div>
      <div class="product-body">
        <div class="product-category">${shortCat}</div>
        <div class="product-name">${p.turkish_name}</div>
        <div class="product-en">${p.english_name}</div>
        <div class="product-footer">
          <span class="product-partno">${p.part_no}</span>
          <span class="product-price">$${p.price_usd.toFixed(2)}</span>
        </div>
        <button class="add-btn ${inCart ? 'added' : ''}" onclick="event.stopPropagation(); addToCart('${p.part_no}', this)">
          ${inCart ? '✓ Sepette' : '+ Sepete Ekle'}
        </button>
      </div>
    </div>`;
  }).join('');

  renderPagination(total);
}

function renderPagination(total) {
  const pages = Math.ceil(total / ITEMS_PER_PAGE);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - currentPage) <= 1) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 2) {
      html += `<span style="color:var(--muted);padding:0 4px;line-height:36px">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filteredProducts.length / ITEMS_PER_PAGE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderProducts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// MODAL
let modalProduct = null;

function openModal(partNo) {
  const p = PRODUCTS.find(x => x.part_no === partNo);
  if (!p) return;
  modalProduct = p;
  const icon = getIcon(p);
  document.getElementById('modalTitle').textContent = p.part_no;
  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalPartCode').textContent = p.part_no;
  document.getElementById('modalDetails').innerHTML = `
    <div class="detail-row"><div class="detail-label">Türkçe</div><div class="detail-val">${p.turkish_name}</div></div>
    <div class="detail-row"><div class="detail-label">English</div><div class="detail-val">${p.english_name}</div></div>
    <div class="detail-row"><div class="detail-label">Kategori</div><div class="detail-val">${p.category}</div></div>
  `;
  document.getElementById('modalPrice').innerHTML = `$${p.price_usd.toFixed(2)} <small>USD</small>`;
  const btn = document.getElementById('modalAddBtn');
  btn.textContent = cart[p.part_no] ? '✓ Sepette' : '+ Sepete Ekle';
  btn.onclick = () => { addToCart(p.part_no); btn.textContent = '✓ Sepette'; };
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// CART
function addToCart(partNo, btn) {
  const p = PRODUCTS.find(x => x.part_no === partNo);
  if (!p) return;
  if (cart[partNo]) {
    cart[partNo].qty++;
  } else {
    cart[partNo] = { ...p, qty: 1 };
  }
  if (btn) { btn.textContent = '✓ Sepette'; btn.classList.add('added'); }
  updateCartCount();
  renderCart();
  showToast(`${p.part_no} sepete eklendi`);
}

function removeFromCart(partNo) {
  delete cart[partNo];
  updateCartCount();
  renderCart();
  renderProducts();
}

function changeQty(partNo, delta) {
  if (!cart[partNo]) return;
  cart[partNo].qty += delta;
  if (cart[partNo].qty <= 0) { removeFromCart(partNo); return; }
  updateCartCount();
  renderCart();
}

function updateCartCount() {
  const total = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = total;
}

function renderCart() {
  const items = Object.values(cart);
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');

  if (items.length === 0) {
    container.innerHTML = `<div class="empty-cart">
      <div class="empty-cart-icon">🛒</div>
      <div class="empty-cart-text">Sepetiniz boş</div>
    </div>`;
    footer.style.display = 'none';
    return;
  }

  container.innerHTML = items.map(item => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.turkish_name}</div>
        <div class="cart-item-no">${item.part_no}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty('${item.part_no}', -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.part_no}', 1)">+</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <button class="remove-btn" onclick="removeFromCart('${item.part_no}')">✕</button>
        <div class="cart-item-price">$${(item.price_usd * item.qty).toFixed(2)}</div>
      </div>
    </div>
  `).join('');

  const total = items.reduce((s, i) => s + i.price_usd * i.qty, 0);
  document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
  footer.style.display = 'block';
}

function toggleCart() {
  const panel = document.getElementById('cartPanel');
  const backdrop = document.getElementById('cartBackdrop');
  panel.classList.toggle('open');
  backdrop.classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// SEARCH
document.getElementById('searchInput').addEventListener('input', applyFilters);

// INIT
renderProducts();
renderCart();
</script>
